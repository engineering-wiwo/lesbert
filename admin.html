<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard - BorrowSmart</title>
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' rx='22' fill='%23ff4fa3'/>
  <circle cx='40' cy='50' r='14' fill='white'/>
  <circle cx='40' cy='50' r='6' fill='%23ff4fa3'/>
  <rect x='50' y='46' width='28' height='8' rx='3' fill='white'/>
  <rect x='62' y='54' width='6' height='10' fill='white'/>
  <rect x='70' y='54' width='6' height='6' fill='white'/>
</svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
<script src="admin2.js" defer></script>
<style>
/* Category dropdown styles */
.category-select {
  position: relative;
}

.category-dropdown {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: white;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.category-dropdown:hover {
  border-color: #999;
}

.category-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border: 1px solid #ddd;
  border-radius: 4px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-top: 2px;
}

.category-list.show {
  display: block;
}

.category-item {
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background-color 0.2s;
}

.category-item:hover {
  background: #f5f5f5;
}

.category-item.default {
  font-weight: 500;
}

.category-item.custom {
  color: #666;
}

.category-section-label {
  padding: 6px 12px;
  font-size: 11px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: #f9f9f9;
  border-top: 1px solid #eee;
  margin-top: 4px;
}

.category-section-label:first-child {
  border-top: none;
  margin-top: 0;
}

.delete-category {
  color: #e74c3c;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 3px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
}

.category-item:hover .delete-category {
  opacity: 1;
}

.delete-category:hover {
  background: #e74c3c;
  color: white;
}

/* Mobile adjustments */
@media (max-width: 768px) {
  .category-list {
    max-height: 150px;
  }
}
</style>
</head>

<body>
<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<header class="header">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
      </svg>
    </div>
    BorrowSmart
  </a>
  <button class="mobile-menu-btn" aria-label="Toggle menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <nav class="nav-links" id="mainNav"></nav>
</header>

<div class="mobile-nav" id="mobileNav"></div>

<div class="container container-wide">

  <!-- LOGIN -->
  <div id="loginSection" class="page-hero" style="display: none;">
    <div class="card animate-in" style="max-width: 400px; margin: 0 auto;">
      <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 24px; margin-bottom: 8px; text-align: center;">Admin Login</h3>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required placeholder="">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="">
        </div>
        <div id="loginError" style="display:none; text-align:center; color: var(--danger); margin-top: 16px;">Invalid credentials</div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top: 8px;">Login</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardSection" style="display: none;">
    <div class="page-hero">
      <h1>Admin Dashboard</h1>
      <p>Manage assets, generate reports, and track inventory.</p>
    </div>

    <!-- STATS -->
    <div class="stats-grid animate-in">
      <div class="stat-card">
        <div class="stat-value" id="borrowedAssets">0</div>
        <div class="stat-label">Borrowed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="availableAssets">0</div>
        <div class="stat-label">Available</div>
      </div>
    </div>

    <!-- ADD ASSET -->
    <div class="section">
      <h2 class="section-title">Add New Asset</h2>
      <div class="card animate-in" style="max-width:800px; margin:0 auto;">
        <form id="addAssetForm" onsubmit="event.preventDefault(); addAsset();">
          <div class="grid-2" style="gap:16px; margin-bottom:16px;">
            <div class="form-group">
              <label>Asset Name</label>
              <input type="text" id="assetName" required placeholder="Enter asset name">
            </div>
            <div class="form-group">
              <label>Category</label>
              <div class="category-select">
                <div class="category-dropdown" id="categoryDropdown" onclick="toggleCategoryList()">
                  <span id="selectedCategory">Select Category</span>
                  <span>▼</span>
                </div>
                <div class="category-list" id="categoryList"></div>
              </div>
              <input type="hidden" id="category" required>
            </div>
          </div>
          <div id="customCategoryDiv" class="form-group" style="display:none; margin-top:16px;">
            <label>Enter Category Name</label>
            <input type="text" id="customCategory" placeholder="Enter custom category name">
          </div>
          <div style="display:flex; gap:16px; align-items:center;">
            <button type="submit" class="btn-primary" id="addAssetBtn">Add Asset</button>
          </div>
        </form>
      </div>
    </div>

    <!-- INVENTORY -->
    <div class="section">
      <div class="inventory-header">
        <h2 class="section-title">Inventory</h2>
        <button class="btn-secondary" onclick="downloadCSV()">Download CSV</button>
      </div>
      <div class="card" style="max-width:1200px; margin:0 auto;">
        <input type="text" id="search" placeholder="Search assets..." onkeyup="searchInventory()">
        <div class="table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Status</th>
                <th>Holder</th>
                <th>Transaction Date &amp; Time</th>
                <th>QR</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="assetBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- end dashboardSection -->

</div>

<script>
// ================= Auto Logout on Page Close/Navigate =================
window.addEventListener("beforeunload", function() {
  localStorage.removeItem("adminLoggedIn");
  localStorage.removeItem("currentAdmin");
});

// ================= Category Management =================
const DEFAULT_CATEGORIES = ['Keys', 'Electronics', 'Equipment', 'Tools'];

function getCustomCategories() {
  return JSON.parse(localStorage.getItem('customCategories') || '[]');
}

function saveCustomCategories(categories) {
  localStorage.setItem('customCategories', JSON.stringify(categories));
}

function addCustomCategory(category) {
  const customCategories = getCustomCategories();
  if (!customCategories.includes(category) && !DEFAULT_CATEGORIES.includes(category)) {
    customCategories.push(category);
    saveCustomCategories(customCategories);
    renderCategoryList();
  }
}

function deleteCustomCategory(category) {
  const customCategories = getCustomCategories();
  const index = customCategories.indexOf(category);
  if (index > -1) {
    customCategories.splice(index, 1);
    saveCustomCategories(customCategories);
    renderCategoryList();
    // Reset selection if deleted category was selected
    if (document.getElementById('category').value === category) {
      selectCategory('');
    }
  }
}

function renderCategoryList() {
  const categoryList = document.getElementById('categoryList');
  const selectedValue = document.getElementById('category').value;
  
  let html = '';
  
  // Default categories section
  if (DEFAULT_CATEGORIES.length > 0) {
    html += `<div class="category-section-label">Default Categories</div>`;
    DEFAULT_CATEGORIES.forEach(cat => {
      const isSelected = selectedValue === cat;
      html += `
        <div class="category-item default ${isSelected ? 'selected' : ''}" onclick="selectCategory('${cat}')">
          <span>${cat}</span>
        </div>
      `;
    });
  }
  
  // Custom categories section
  const customCategories = getCustomCategories();
  if (customCategories.length > 0) {
    html += `<div class="category-section-label">Custom Categories</div>`;
    customCategories.forEach(cat => {
      const isSelected = selectedValue === cat;
      html += `
        <div class="category-item custom ${isSelected ? 'selected' : ''}" onclick="selectCategory('${cat}')">
          <span>${cat}</span>
          <span class="delete-category" onclick="event.stopPropagation(); deleteCustomCategory('${cat}')">✕</span>
        </div>
      `;
    });
  }
  
  // Add new category option
  const isSelected = selectedValue === 'Others';
  html += `
    <div class="category-section-label">Add New</div>
    <div class="category-item ${isSelected ? 'selected' : ''}" onclick="selectCategory('Others')">
      <span>+ Add New Category</span>
    </div>
  `;
  
  categoryList.innerHTML = html;
}

function toggleCategoryList() {
  const categoryList = document.getElementById('categoryList');
  const isOpen = categoryList.classList.contains('show');
  
  // Close all other dropdowns
  document.querySelectorAll('.category-list').forEach(list => {
    list.classList.remove('show');
  });
  
  // Toggle this dropdown
  if (!isOpen) {
    categoryList.classList.add('show');
    // Add click outside listener
    setTimeout(() => {
      document.addEventListener('click', closeCategoryList);
    }, 100);
  }
}

function closeCategoryList(e) {
  const categorySelect = document.querySelector('.category-select');
  if (!categorySelect.contains(e.target)) {
    document.getElementById('categoryList').classList.remove('show');
    document.removeEventListener('click', closeCategoryList);
  }
}

function selectCategory(value) {
  document.getElementById('category').value = value;
  document.getElementById('selectedCategory').textContent = value || 'Select Category';
  document.getElementById('categoryList').classList.remove('show');
  document.removeEventListener('click', closeCategoryList);
  handleCategoryChange(value);
}

// Initialize category list when page loads
document.addEventListener('DOMContentLoaded', function() {
  renderCategoryList();
});
</script>
</body>
</html>
